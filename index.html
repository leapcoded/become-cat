            'You are watching a fly on the ceiling with professional interest.',
            'Your human is working; you should probably sit on their hand.',
            'You have discovered that bags with handles are dangerous traps.',
            'Your reflexes are now fast enough to catch a falling pen.',
            'You have realized that your human is really just a large, hairless cat.',
            'You have successfully occupied the top of the bookshelf.',
            'Your purr has become a low-frequency hum.',
            'The rug is bunching up. You have won this battle.',
            'You are currently dreaming of giant, flying treats.',
            'Your whiskers are tickling the air as you explore.',
            'You have decided to supervise the human while they brush their teeth.',
            'The hallway is your personal drag-strip.',
            'You are currently staring at the dust motes in a sunbeam.',
            'Your tail has developed a mind of its own.',
            'You have mastered the "paws-up" sleeping position.',
            'A stray feather is now the prize of your collection.',
            'You feel like a panther in a living room.',
            'You are currently very interested in the shadow of a bird outside.',
            'The human is calling you; you have decided to ignore them.',
            'Your balance while walking on the back of the sofa is impeccable.',
            'You have achieved 100% comfort in any position.',
            'You are practicing your silent, stalking posture.',
            'Your transformation is becoming very, very cozy.',
            'You are now, officially, a professional nap enthusiast.'
        ];

        const levels = [
            { min: 0, label: 'Just Human', short: 'Human', vibe: 'Dealing with daily life; completely un-feline.' },
            { min: 10, label: 'Sunbeam Seeker', short: 'Sunbeam', vibe: 'You suddenly find yourself magnetized to patches of sunlight on the floor.' },
            { min: 20, label: 'The "Nose-Boop" Reflex', short: 'Nose-Boop', vibe: 'Your sense of smell gets suspiciously good, especially when someone opens a bag of snacks.' },
            { min: 30, label: 'The Head-Tilt Upgrade', short: 'Head-Tilt', vibe: 'Curiosity takes over; you find yourself tilting your head at weird angles to investigate things.' },
            { min: 40, label: 'Toe-Bean Development', short: 'Toe-Bean', vibe: 'Your feet feel "spongy" and softer; you stop wearing shoes because they\u2019re suddenly annoying.' },
            { min: 50, label: 'The Great Stretch', short: 'Stretch', vibe: 'That half-human, half-cat point where you just want to reach every limb to the sky and yawn for five minutes straight.' },
            { min: 60, label: 'Whisker Tingles', short: 'Whiskers', vibe: 'You get that tickly feeling in your cheeks, and you suddenly know exactly how narrow a gap is before you try to walk through it.' },
            { min: 70, label: 'The Tail-Talk Phase', short: 'Tail-Talk', vibe: 'You can\u2019t control it\u2014it wiggles when you\u2019re happy and puffs up when you\u2019re startled.' },
            { min: 80, label: 'Gravity Negation', short: 'Gravity', vibe: 'You start jumping onto high shelves without thinking about it. How did you get up there? Who knows!' },
            { min: 90, label: 'The Midnight Zoomies', short: 'Zoomies', vibe: 'Your energy levels are peaking; it\u2019s 3 AM and you need to run at maximum velocity for no reason.' },
            { min: 100, label: 'Total Cat', short: 'Cat', vibe: 'You are peak cat. You\u2019ve achieved maximum floof, total comfort, and the ability to nap literally anywhere.' }
        ];

        const upgrades = [
            { id: 'kibble', name: 'Kibble', desc: 'Dry crunchies. The ultimate convenience food.', baseCost: 20, type: 'passive', baseCps: 0.1 },
            { id: 'feather-toy', name: 'Feather Toy', desc: 'You can catch it if you just try hard enough.', baseCost: 40, type: 'click', basePower: 1 },
            { id: 'cardboard-box', name: 'Cardboard Box', desc: 'If it fits, you sits.', baseCost: 250, type: 'passive', baseCps: 0.85 },
            { id: 'scratching-post', name: 'Scratching Post', desc: 'Sharpen your claws. Save the couch.', baseCost: 900, type: 'passive', baseCps: 2.8 },
            { id: 'crinkle-ball', name: 'Crinkle Ball', desc: 'It crinkles. You are compelled to attack.', baseCost: 180, type: 'click', basePower: 1 },
            { id: 'window-perch', name: 'Window Perch', desc: 'Premium bird-watching spot.', baseCost: 3_000, type: 'passive', baseCps: 7 },
            { id: 'laser-pointer', name: 'Laser Pointer', desc: 'The red dot CAN be caught.', baseCost: 4_500, type: 'click', basePower: 2 },
            { id: 'cat-tree', name: 'Cat Tree', desc: 'Multiple levels. One supreme ruler. You.', baseCost: 15_000, type: 'passive', baseCps: 32 },
            { id: 'catnip-plant', name: 'Catnip Plant', desc: 'Now legal on a medical basis.', baseCost: 70_000, type: 'passive', baseCps: 125 },
            { id: 'heated-bed', name: 'Heated Bed', desc: 'Toasty. Non-negotiable.', baseCost: 280_000, type: 'passive', baseCps: 600 },
            { id: 'wet-food', name: 'Wet Food', desc: 'The good stuff. Served in your finest cat bowl.', baseCost: 2_000_000, type: 'passive', baseCps: 2_800 },
            { id: 'automatic-feeder', name: 'Automatic Feeder', desc: 'Food appears on command.', baseCost: 10_000_000, type: 'passive', baseCps: 10_000 },
            { id: 'cat-hrt', name: 'Cat HRT', desc: 'Physician-approved species transformation.', baseCost: 200_000_000, type: 'perk', mult: 1.75, maxOwned: 1 }
        ];

        const LEGACY_OWNED_MAP = {
            claws: 'feather-toy',
            whisker: 'kibble',
            box: 'cardboard-box',
            sunbeam: 'window-perch',
            catnip: 'catnip-plant',
            nap: 'heated-bed',
            cult: 'automatic-feeder'
        };

        const upgradeEls = new Map();
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        let state = {
            essence: 0,
            totalEssence: 0,
            owned: Object.fromEntries(upgrades.map((u) => [u.id, 0])),
            lastTick: Date.now(),
            lastMessageIndex: -1
        };

        function formatNum(n) {
            if (n < 10 && n % 1 !== 0) return n.toFixed(1);
            if (n < 1_000) return Math.floor(n).toLocaleString();
            if (n < 1_000_000) return `${(n / 1_000).toFixed(n < 10_000 ? 2 : 1)}K`;
            if (n < 1_000_000_000) return `${(n / 1_000_000).toFixed(n < 10_000_000 ? 2 : 1)}M`;
            return `${(n / 1_000_000_000).toFixed(2)}B`;
        }

        function initMilestones() {
            progressMilestones.innerHTML = levels.map((level) =>
                `<span class="milestone" data-at="${level.min}" title="${level.label}">${level.short}</span>`
            ).join('');
        }

        function getMilestones() {
            return progressMilestones.querySelectorAll('.milestone');
        }

        function getTransformPercent() {
            const ratio = Math.min(1, state.totalEssence / TRANSFORM_GOAL);
            return Math.min(100, 100 * Math.pow(ratio, TRANSFORM_EXPONENT));
        }

        function getLevel(pct) {
            let current = levels[0];
            let index = 0;
            for (let i = 0; i < levels.length; i++) {
                if (pct >= levels[i].min) {
                    current = levels[i];
                    index = i;
                }
            }
            return { ...current, index };
        }

        function getPerkMultiplier() {
            let mult = 1;
            for (const u of upgrades) {
                if (u.type === 'perk' && state.owned[u.id] > 0) mult *= u.mult;
            }
            return mult;
        }

        function getClickPower() {
            let power = 1;
            for (const u of upgrades) {
                if (u.type === 'click') power += u.basePower * state.owned[u.id];
            }
            return power * getPerkMultiplier();
        }

        function getCps() {
            let cps = 0;
            for (const u of upgrades) {
                if (u.type === 'passive') cps += u.baseCps * state.owned[u.id];
            }
            return cps * getPerkMultiplier();
        }

        function getUpgradeCost(upgrade) {
            if (upgrade.maxOwned && state.owned[upgrade.id] >= upgrade.maxOwned) return Infinity;
            return Math.ceil(upgrade.baseCost * Math.pow(COST_MULT, state.owned[upgrade.id]));
        }

        function getEffectLabel(upgrade, owned) {
            if (upgrade.type === 'perk') {
                const pct = Math.round((upgrade.mult - 1) * 100);
                return owned > 0 ? `+${pct}% all essence` : `+${pct}% all essence · one-time`;
            }
            const perUnit = upgrade.type === 'click' ? `+${upgrade.basePower}/bap` : `+${upgrade.baseCps}/s`;
            if (owned === 0) return perUnit;
            const total = upgrade.type === 'click' ? upgrade.basePower * owned : upgrade.baseCps * owned;
            return `${perUnit} · ${formatNum(total)} total`;
        }

        function getTotalOwned() {
            return Object.values(state.owned).reduce((a, b) => a + b, 0);
        }

        function pickMessage() {
            let index;
            do {
                index = Math.floor(Math.random() * messages.length);
            } while (messages.length > 1 && index === state.lastMessageIndex);
            state.lastMessageIndex = index;
            return messages[index];
        }

        function addEssence(amount) {
            state.essence += amount;
            state.totalEssence += amount;
        }

        function save() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    essence: state.essence,
                    totalEssence: state.totalEssence,
                    owned: state.owned,
                    lastTick: Date.now()
                }));
            } catch (_) { /* ignore */ }
        }

        function resetProgress() {
            if (!confirm('Reset all progress? Essence, supplies, and transformation will be cleared.')) return;

            try {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem('become-cat-save-v2');
                localStorage.removeItem('become-cat-save-v1');
            } catch (_) { /* ignore */ }

            state.essence = 0;
            state.totalEssence = 0;
            state.owned = Object.fromEntries(upgrades.map((u) => [u.id, 0]));
            state.lastTick = Date.now();
            state.lastMessageIndex = -1;
            messageDisplay.textContent = 'Progress reset. You are human again. For now.';
            updateUI();
            save();
        }

        function migrateOwned(savedOwned) {
            const merged = Object.fromEntries(upgrades.map((u) => [u.id, 0]));
            if (!savedOwned) return merged;
            for (const [key, count] of Object.entries(savedOwned)) {
                const id = LEGACY_OWNED_MAP[key] || key;
                if (id in merged) merged[id] += count;
            }
            return merged;
        }

        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY)
                    || localStorage.getItem('become-cat-save-v2')
                    || localStorage.getItem('become-cat-save-v1');
                if (!raw) return;
                const data = JSON.parse(raw);
                state.essence = data.essence ?? 0;
                state.totalEssence = data.totalEssence ?? 0;
                state.owned = migrateOwned(data.owned);
                if (data.lastTick) {
                    const elapsed = (Date.now() - data.lastTick) / 1000;
                    const offlineGain = getCps() * Math.min(elapsed, 1200);
                    if (offlineGain > 0) addEssence(offlineGain);
                }
            } catch (_) { /* ignore */ }
        }

        function spawnFloat(amount) {
            if (prefersReducedMotion) return;
            const el = document.createElement('span');
            el.className = 'float-text';
            el.textContent = `+${formatNum(amount)}`;
            bapZone.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }

        function initUpgrades() {
            upgradeList.innerHTML = '';
            for (const upgrade of upgrades) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `upgrade${upgrade.type === 'perk' ? ' perk' : ''}`;
                btn.dataset.id = upgrade.id;
                btn.innerHTML = `
                    <span class="upgrade-icon" data-field="icon"></span>
                    <span class="upgrade-body">
                        <div class="upgrade-top">
                            <span class="upgrade-name" data-field="name"></span>
                            <span class="upgrade-cost" data-field="cost"></span>
                        </div>
                        <div class="upgrade-desc" data-field="desc"></div>
                        <div class="upgrade-effect" data-field="effect"></div>
                    </span>
                `;
                btn.addEventListener('click', () => buyUpgrade(upgrade.id));
                btn.querySelector('[data-field="icon"]').innerHTML = svg(SUPPLY_SVGS[upgrade.id]);
                upgradeList.appendChild(btn);
                upgradeEls.set(upgrade.id, btn);
            }
        }

        function updateUpgrades() {
            for (const upgrade of upgrades) {
                const btn = upgradeEls.get(upgrade.id);
                if (!btn) continue;

                const owned = state.owned[upgrade.id];
                const cost = getUpgradeCost(upgrade);
                const atMax = upgrade.maxOwned && owned >= upgrade.maxOwned;
                const canAfford = !atMax && state.essence >= cost;

                btn.classList.toggle('can-buy', canAfford);
                btn.classList.toggle('perk-owned', upgrade.type === 'perk' && atMax);
                btn.disabled = !canAfford;
                btn.title = upgrade.desc;
                btn.querySelector('[data-field="name"]').textContent = upgrade.name;
                btn.querySelector('[data-field="desc"]').textContent = upgrade.desc;
                btn.querySelector('[data-field="effect"]').textContent = upgrade.type === 'perk' && atMax
                    ? 'Active'
                    : `${getEffectLabel(upgrade, owned)}${owned > 0 && upgrade.type !== 'perk' ? ` · ×${owned}` : ''}`;
                btn.querySelector('[data-field="cost"]').textContent = atMax ? 'Owned' : formatNum(cost);
            }
        }

        function updateUI() {
            const pct = getTransformPercent();
            const level = getLevel(pct);
            const stage = String(level.index + 1);

            progressBar.style.width = `${pct}%`;
            progressTrack.setAttribute('aria-valuenow', pct.toFixed(2));
            progressPercent.textContent = `${pct.toFixed(2)}%`;
            levelLabel.innerHTML = `Stage <strong>${stage}</strong> · ${level.label}`;
            stageVibe.textContent = level.vibe;
            essenceDisplay.textContent = formatNum(state.essence);
            cpsDisplay.textContent = formatNum(getCps());
            bapPowerDisplay.textContent = formatNum(getClickPower());
            buttonLabel.textContent = pct >= 100 ? 'Total Cat' : 'Bap';
            shopCount.textContent = `${getTotalOwned()} owned`;

            getMilestones().forEach((m) => {
                m.classList.toggle('reached', pct >= Number(m.dataset.at));
            });

            updateUpgrades();
        }

        function buyUpgrade(id) {
            const upgrade = upgrades.find((u) => u.id === id);
            if (upgrade.maxOwned && state.owned[id] >= upgrade.maxOwned) return;
            const cost = getUpgradeCost(upgrade);
            if (state.essence < cost) return;

            state.essence -= cost;
            state.owned[id] += 1;
            messageDisplay.textContent = upgrade.type === 'perk'
                ? 'Cat HRT acquired. The whiskers feel correct.'
                : `Got ${upgrade.name}.`;
            updateUI();
            save();
        }

        function bap() {
            const gained = getClickPower();
            addEssence(gained);
            messageDisplay.textContent = pickMessage();
            spawnFloat(gained);
            updateUI();
            save();
        }

        function tick() {
            const now = Date.now();
            const delta = (now - state.lastTick) / 1000;
            state.lastTick = now;
            const cps = getCps();
            if (cps > 0 && delta > 0) {
                addEssence(cps * delta);
                updateUI();
            }
        }

        button.addEventListener('click', bap);
        button.addEventListener('keydown', (event) => {
            if (event.key === ' ' || event.key === 'Enter') {
                event.preventDefault();
                bap();
            }
        });
        resetButton.addEventListener('click', resetProgress);

        load();
        initMilestones();
        initUpgrades();
        state.lastTick = Date.now();
        updateUI();

        setInterval(tick, 100);
        setInterval(save, 5000);
    </script>
</body>
</html>
